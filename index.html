<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Seguro - NSUsuarios</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 80px; background-color: #f4f7f6; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2ea44f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2c974b; }
        #error { color: #d73a49; font-size: 13px; margin-top: 15px; min-height: 18px; }
    </style>
</head>
<body>

<div class="card" id="login-box">
    <h2>Iniciar Sesión</h2>
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Entrar al Sistema</button>
    <p id="error"></p>
</div>

<script type="module">
  // Importamos las librerías necesarias directamente de la web
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // TUS DATOS REALES DE CONFIGURACIÓN
  const firebaseConfig = {
    apiKey: "AIzaSyC76690rc5SKbN0kFFOOLsa-ua21VJ-8dI",
    authDomain: "nsusuarios.firebaseapp.com",
    projectId: "nsusuarios",
    storageBucket: "nsusuarios.firebasestorage.app",
    messagingSenderId: "753486575180",
    appId: "1:753486575180:web:2bb95bf20ac3dafbf626e9"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Función de Login
  window.login = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;
    const errorTxt = document.getElementById('error');

    errorTxt.innerText = "Cargando...";

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // ENTRADA EXITOSA: Aquí puedes poner a dónde quieres que vaya el usuario
        document.body.innerHTML = `
            <div class="card">
                <h1 style="color: #2ea44f;">¡Bienvenido!</h1>
                <p>Has iniciado sesión de forma segura.</p>
                <button onclick="location.reload()" style="background: #0366d6;">Cerrar Sesión</button>
            </div>`;
      })
      .catch((error) => {
        console.error(error);
        errorTxt.innerText = "Usuario o contraseña incorrectos.";
      });
  }
</script>

</body>
</html>
