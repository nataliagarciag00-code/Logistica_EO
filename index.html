<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyC76690rc5SKbN0kFFOOLsa-ua21VJ-8dI", 
        authDomain: "nsusuarios.firebaseapp.com", 
        projectId: "nsusuarios", 
        storageBucket: "nsusuarios.firebasestorage.app", 
        messagingSenderId: "753486575180", 
        appId: "1:753486575180:web:2bb95bf20ac3dafbf626e9" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let masterData = [];
    let charts = {};

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-view').classList.add('oculto');
            document.getElementById('dashboard-view').style.display = 'block';
            cargarDesdeFirebase();
        } else {
            document.getElementById('login-view').classList.remove('oculto');
            document.getElementById('dashboard-view').style.display = 'none';
        }
    });

    window.iniciarSesion = async () => {
        const u = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            await signInWithEmailAndPassword(auth, u, p);
        } catch (e) {
            document.getElementById('login-msg').innerText = "Error: Credenciales inválidas";
        }
    };

    window.cerrarSesion = () => signOut(auth);

    async function cargarDesdeFirebase() {
        try {
            const snap = await getDocs(collection(db, "servicios_settepi"));
            masterData = [];
            snap.forEach(d => masterData.push(d.data()));
            actualizarSelectores();
            procesarYRenderizar();
        } catch (e) {
            console.error("Error en Firebase:", e);
        }
    }

    function actualizarSelectores() {
        const sems = [...new Set(masterData.map(d=>d.sem))].sort((a,b)=>a-b);
        document.getElementById('sel-sem').innerHTML = '<option value="ALL">Todas las Semanas</option>' + sems.map(s=>`<option value="${s}">Semana ${s}</option>`).join('');
        const clis = [...new Set(masterData.map(d=>d.grp))].sort();
        document.getElementById('sel-cliente').innerHTML = '<option value="ALL">Todos los Clientes/UDN</option>' + clis.map(c=>`<option value="${c}">${c}</option>`).join('');
    }

    window.procesarYRenderizar = () => {
        const crit = parseInt(document.getElementById('sel-criterio').value);
        const fSem = document.getElementById('sel-sem').value;
        const fCli = document.getElementById('sel-cliente').value;

        const data = masterData.filter(d => (fSem === 'ALL' || String(d.sem) === fSem) && (fCli === 'ALL' || d.grp === fCli));
        
        const total = data.length || 1;
        const tardeCount = data.filter(d => d.latL > crit).length;
        const initOk = data.filter(d => d.latI <= 0).length;

        document.getElementById('k-ns').innerText = ((1 - tardeCount/total)*100).toFixed(1) + '%';
        document.getElementById('k-init').innerText = ((initOk/total)*100).toFixed(1) + '%';
        document.getElementById('k-viajes').innerText = data.length;
        document.getElementById('k-tarde').innerText = tardeCount;

        renderGraficas(data, crit, tardeCount);
        renderTabla(data, crit);
    };

    function renderGraficas(data, crit, tardeCount) {
        const sems = [...new Set(data.map(d=>d.sem))].sort((a,b)=>a-b);
        
        // Gráfica de Líneas
        if(charts.trend) charts.trend.destroy();
        charts.trend = new Chart(document.getElementById('chartTrend'), {
            type: 'line',
            data: {
                labels: sems.map(s=>'S'+s),
                datasets: [{ 
                    label: '% Cumplimiento', 
                    data: sems.map(s=>{ 
                        const d = data.filter(x=>x.sem===s); 
                        return ((1 - d.filter(x=>x.latL > crit).length / d.length) * 100).toFixed(1);
                    }), 
                    borderColor: '#4caf50', fill: true, tension: 0.3 
                }]
            },
            options: { maintainAspectRatio: false }
        });
        
        // Gráfica de Dona (Aquí estaba el error "tarde")
        if(charts.pie) charts.pie.destroy();
        charts.pie = new Chart(document.getElementById('chartPie'), {
            type: 'doughnut',
            data: { 
                labels: ['Puntual', 'Retraso'], 
                datasets: [{ 
                    data: [data.length - tardeCount, tardeCount], 
                    backgroundColor: ['#4caf50', '#d32f2f'] 
                }] 
            },
            options: { maintainAspectRatio: false }
        });
    }

    function renderTabla(data, crit) {
        const tbody = document.querySelector('#tabla-retrasos tbody');
        tbody.innerHTML = data.filter(d => d.latL > crit).map(f => `
            <tr>
                <td>${f.des}</td>
                <td>${f.sem}</td>
                <td>${f.grp}</td>
                <td>${f.operador}</td>
                <td style="color:red; font-weight:bold;">${f.latL} min</td>
                <td>FALLA</td>
            </tr>
        `).join('');
    }

    // Carga de Excel mejorada para múltiples formatos
    document.getElementById('xlInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = async (evt) => {
            const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            for (let i = 0; i < json.length; i++) {
                const row = json[i];
                const sem = row['Sem Via'] || row['Semana'] || row['sem'] || "N/A";
                const des = row['des'] || row['Ruta'] || "Sin Nombre";
                
                const toM = (v) => { 
                    if(typeof v === 'number') return v*1440; 
                    const p=String(v||"0:0").split(':'); 
                    return parseInt(p[0])*60 + parseInt(p[1]||0); 
                };

                const latL = Math.max(0, Math.round(toM(row['end_eta']) - toM(row['end_time'])));
                const latI = Math.max(0, Math.round(toM(row['start_eta']) - toM(row['start_time'])));
                
                await setDoc(doc(db, "servicios_settepi", `${sem}-${des}-${i}`), {
                    sem, des, latL, latI,
                    grp: row['group'] || row['Cliente'] || row['UDN'] || "General",
                    operador: row['oper_name'] || row['Operador'] || "N/A"
                });
            }
            location.reload();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });
</script>
