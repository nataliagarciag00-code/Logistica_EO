<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settepi - Logistica_EO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #004a99; --amarillo: #ffcc00; --blanco: #ffffff; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--gris); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { background: var(--blanco); padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .header { background: var(--azul); color: var(--blanco); padding: 20px; border-radius: 10px; border-bottom: 5px solid var(--amarillo); margin-bottom: 25px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        /* Estilos de botones */
        .btn-azul { background-color: var(--azul); color: var(--blanco); }
        .btn-amarillo { background-color: var(--amarillo); color: #333; }
        .btn-verde { background-color: #2e7d32; color: white; }
        .btn-gris { background-color: #757575; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Vistas */
        #menu-principal, #vista-update, #vista-dashboard { display: none; }
        .view-expanded { max-width: 800px; }
    </style>
</head>
<body>

<div id="login-section" class="container">
    <div class="header">
        <h2 style="margin:0;">Settepi Logística</h2>
        <small>Acceso Logistica_EO</small>
    </div>
    <input type="email" id="email" placeholder="Usuario (Correo)">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn btn-azul" onclick="login()">Iniciar Sesión</button>
    <p id="error" style="color: red; font-size: 14px; margin-top: 15px;"></p>
</div>

<div id="menu-principal" class="container">
    <div class="header"><h2 style="margin:0;">Menú Principal</h2></div>
    <button id="btn-admin" class="btn btn-amarillo" onclick="showView('vista-update')">📝 Actualizar Información</button>
    <button class="btn btn-azul" onclick="showView('vista-dashboard')">📊 Ver Dashboard</button>
    <button class="btn btn-gris" onclick="location.reload()" style="margin-top:30px;">Cerrar Sesión</button>
</div>

<div id="vista-update" class="container">
    <div class="header"><h2 style="margin:0;">Captura de Datos</h2></div>
    <p>Ingrese el Nivel de Servicio actual (%):</p>
    <input type="number" id="input-valor" placeholder="Ejemplo: 95" min="0" max="100">
    <button class="btn btn-verde" onclick="guardar()">Guardar Cambios</button>
    <button class="btn btn-gris" onclick="showView('menu-principal')">Volver al Menú</button>
</div>

<div id="vista-dashboard" class="container view-expanded">
    <div class="header"><h2 style="margin:0;">Dashboard de Cumplimiento</h2></div>
    <div style="height: 300px; margin-bottom: 20px;">
        <canvas id="grafica"></canvas>
    </div>
    <div id="indicador" style="padding:15px; font-weight:bold; border-radius:8px; font-size:18px;">Cargando...</div>
    <button class="btn btn-gris" onclick="showView('menu-principal')" style="max-width: 200px;">Volver</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuración de tu proyecto
    const firebaseConfig = {
        apiKey: "AIzaSyC76690rc5SKbN0kFFOOLsa-ua21VJ-8dI",
        authDomain: "nsusuarios.firebaseapp.com",
        projectId: "nsusuarios",
        storageBucket: "nsusuarios.firebasestorage.app",
        messagingSenderId: "753486575180",
        appId: "1:753486575180:web:2bb95bf20ac3dafbf626e9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let chart;

    // Función de Login
    window.login = function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const errorMsg = document.getElementById('error');

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('menu-principal').style.display = 'block';
                
                // Restricción de Admin: Solo n.garcia puede actualizar
                if(email.toLowerCase() !== "n.garcia@settepi.com") {
                    document.getElementById('btn-admin').style.display = 'none';
                }
                initChart();
            })
            .catch((error) => {
                errorMsg.innerText = "Error: Usuario o contraseña no válidos.";
            });
    }

    // Navegación entre vistas
    window.showView = function(viewId) {
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById('vista-update').style.display = 'none';
        document.getElementById('vista-dashboard').style.display = 'none';
        document.getElementById(viewId).style.display = 'block';
    }

    // Función para GUARDAR datos en Firestore
    window.guardar = async function() {
        const inputVal = document.getElementById('input-valor').value;
        if(inputVal === "") {
            alert("Por favor, ingresa un valor numérico.");
            return;
        }

        try {
            await setDoc(doc(db, "logistica", "actual"), { 
                valor: Number(inputVal),
                fecha: new Date().toLocaleString()
            });
            alert("¡Información actualizada con éxito!");
            showView('menu-principal');
        } catch (e) {
            console.error("Error al guardar: ", e);
            alert("Error al guardar. Revisa las reglas de Firestore.");
        }
    }

    // Inicialización de la Gráfica y escucha en tiempo real
    function initChart() {
        const ctx = document.getElementById('grafica').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Nivel de Servicio Actual'],
                datasets: [{
                    label: '% Cumplimiento',
                    data: [0],
                    backgroundColor: '#004a99',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });

        // Escucha cambios en Firestore
        onSnapshot(doc(db, "logistica", "actual"), (snap) => {
            if(snap.exists()) {
                const data = snap.data();
                const valor = data.valor;
                
                chart.data.datasets[0].data = [valor];
                
                const indicador = document.getElementById('indicador');
                if(valor >= 95) {
                    chart.data.datasets[0].backgroundColor = '#2e7d32';
                    indicador.innerText = `CUMPLIMIENTO: ${valor}% - OBJETIVO LOGRADO`;
                    indicador.style.backgroundColor = '#c8e6c9';
                    indicador.style.color = '#1b5e20';
                } else {
                    chart.data.datasets[0].backgroundColor = '#ffcc00';
                    indicador.innerText = `CUMPLIMIENTO: ${valor}% - BAJO OBJETIVO`;
                    indicador.style.backgroundColor = '#fff9c4';
                    indicador.style.color = '#f57f17';
                }
                chart.update();
            }
        });
    }
</script>
</body>
</html>
