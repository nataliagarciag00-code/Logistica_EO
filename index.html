<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - GitHub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #eef2f3; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        
        .btn-login { background-color: #2ea44f; color: white; }
        .btn-login:hover { background-color: #2c974b; }
        
        .btn-reg { background-color: #0366d6; color: white; margin-top: 10px; }
        .btn-reg:hover { background-color: #0255b3; }

        .hidden { display: none; }
        #msg { color: #d73a49; font-size: 14px; margin-top: 10px; }
        .success-msg { color: #28a745 !important; }
    </style>
</head>
<body>

<div class="card" id="login-section">
    <h2>Iniciar Sesión</h2>
    <input type="text" id="user-login" placeholder="Usuario">
    <input type="password" id="pass-login" placeholder="Contraseña">
    <button class="btn-login" onclick="intentarLogin()">Entrar al Sistema</button>
    <p id="msg"></p>
</div>

<div class="card hidden" id="admin-section">
    <h2 id="welcome-txt">¡Bienvenido!</h2>
    <p style="color: #666; font-size: 14px;">Panel de Administración de Usuarios</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <h3>Crear Nuevo Usuario</h3>
    <input type="text" id="new-user" placeholder="Nombre del nuevo usuario">
    <input type="password" id="new-pass" placeholder="Contraseña para él">
    <button class="btn-reg" onclick="registrarNuevo()">Registrar y Guardar</button>
    
    <button style="margin-top: 30px; background: #f6f8fa; color: #555; border: 1px solid #d1d5da;" onclick="location.reload()">Cerrar Sesión</button>
</div>

<script>
    // Al cargar, nos aseguramos de que el primer usuario exista 
    // (Si es la primera vez que entras, el sistema te crea uno por defecto: admin / 1234)
    if (!localStorage.getItem('user_admin')) {
        localStorage.setItem('user_admin', 'admin');
        localStorage.setItem('pass_admin', '1234');
    }

    function intentarLogin() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;
        
        // Buscamos en la "base de datos" local
        const savedU = localStorage.getItem('user_' + u);
        const savedP = localStorage.getItem('pass_' + u);

        if (u === savedU && p === savedP && u !== "") {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('welcome-txt').innerText = "Hola, " + u;
        } else {
            document.getElementById('msg').innerText = "Acceso denegado. Usuario o clave incorrecta.";
        }
    }

    function registrarNuevo() {
        const newUser = document.getElementById('new-user').value;
        const newPass = document.getElementById('new-pass').value;
        
        if (newUser && newPass) {
            // Guardamos el nuevo par en el LocalStorage
            localStorage.setItem('user_' + newUser, newUser);
            localStorage.setItem('pass_' + newUser, newPass);
            
            alert("Usuario '" + newUser + "' registrado con éxito. Ya puede iniciar sesión.");
            
            // Limpiamos los campos
            document.getElementById('new-user').value = "";
            document.getElementById('new-pass').value = "";
        } else {
            alert("Por favor escribe un nombre y contraseña.");
        }
    }
</script>

</body>
</html>
