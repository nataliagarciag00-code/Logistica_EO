<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Settepi BI | Control Room v5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --s-azul: #003366; --s-oro: #FFCC00;
            --ok: #0056b3; --no-info: #9e9e9e; 
            --inicio-tarde: #b71c1c; --trayecto: #e65100; --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.1); z-index: 10001; display: none; }
        #progress-bar { height: 100%; width: 0%; background: var(--s-oro); box-shadow: 0 0 20px var(--s-oro); transition: width 0.2s; }

        .topbar { background: var(--s-azul); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--s-oro); }
        .filters { background: white; padding: 20px 40px; display: flex; gap: 20px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        select { padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; color: var(--s-azul); }
        .container { padding: 30px 40px; max-width: 1600px; margin: auto; }
        
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 35px; }
        .kpi-card { background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--s-azul); }
        
        .grid-charts { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 400px; }
        
        .oculto { display: none !important; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th { background: var(--s-azul); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .badge-offline { background: #ffeded; color: #b71c1c; padding: 4px 8px; border-radius: 4px; font-size: 10px; margin-left: 10px; border: 1px solid #b71c1c; }
    </style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>

<div id="dashboard-view">
    <div class="topbar">
        <h2 style="margin:0;">Settepi <span style="color:var(--s-oro)">Control Room</span> <span id="status-tag"></span></h2>
        <div>
            <button class="btn" style="background:var(--s-oro); color:var(--s-azul); font-weight:bold; padding:10px 20px; border-radius:8px; border:none; cursor:pointer;" onclick="document.getElementById('xlInput').click()">📥 ACTUALIZAR EXCEL (LOCAL)</button>
            <input type="file" id="xlInput" class="oculto">
        </div>
    </div>

    <div class="filters">
        <select id="sel-periodo" onchange="procesarYRenderizar()"><option value="sem">Semana</option><option value="mes">Mes</option></select>
        <select id="sel-bu" onchange="actualizarClientes()"><option value="ALL">Todas las BUs</option></select>
        <select id="sel-grp" onchange="procesarYRenderizar()"><option value="ALL">Todos los Clientes</option></select>
    </div>

    <div class="container">
        <div class="kpi-row">
            <div class="kpi-card"><span>NS General</span><h2 id="k-ns" style="font-size:32px; margin:10px 0;">0%</h2></div>
            <div class="kpi-card"><span>Viajes Totales</span><h2 id="k-viajes" style="font-size:32px; margin:10px 0;">0</h2></div>
            <div class="kpi-card"><span>Inicios Tarde</span><h2 id="k-tarde" style="color:var(--inicio-tarde); font-size:32px; margin:10px 0;">0</h2></div>
            <div class="kpi-card"><span>Sin GPS/ETA</span><h2 id="k-noinfo" style="color:var(--no-info); font-size:32px; margin:10px 0;">0</h2></div>
        </div>

        <div class="grid-charts">
            <div class="chart-box">
                <h4>CUMPLIMIENTO HISTÓRICO (STACKED)</h4>
                <canvas id="chartStacked"></canvas>
            </div>
            <div class="chart-box">
                <h4>DISTRIBUCIÓN DE INCIDENCIAS</h4>
                <canvas id="chartDona"></canvas>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
            <div class="chart-box" style="height: auto;">
                <h4>TOP 10 OPERADORES (MÁS INICIOS TARDE)</h4>
                <table id="tab-ops">
                    <thead><tr><th>OPERADOR</th><th>FALLAS</th><th>ESTADO</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="chart-box" style="height: auto;">
                <h4>DETALLE POR CLIENTE Y BU</h4>
                <table id="tab-data">
                    <thead><tr id="head-data"></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let masterData = [];
    let charts = {};

    // Cargar datos al iniciar
    window.onload = () => {
        const local = localStorage.getItem('settepi_local_db');
        if(local) {
            masterData = JSON.parse(local);
            document.getElementById('status-tag').innerHTML = '<span class="badge-offline">BASE LOCAL CARGADA</span>';
            llenarBU();
            procesarYRenderizar();
        }
    };

    function llenarBU() {
        const bus = [...new Set(masterData.map(d=>d.bu))].sort();
        document.getElementById('sel-bu').innerHTML = '<option value="ALL">Todas las BUs</option>' + bus.map(b=>`<option value="${b}">${b}</option>`).join('');
    }

    window.actualizarClientes = () => {
        const bu = document.getElementById('sel-bu').value;
        const filtered = bu === 'ALL' ? masterData : masterData.filter(d=>d.bu===bu);
        const grps = [...new Set(filtered.map(d=>d.grp))].sort();
        document.getElementById('sel-grp').innerHTML = '<option value="ALL">Todos los Clientes</option>' + grps.map(g=>`<option value="${g}">${g}</option>`).join('');
        procesarYRenderizar();
    }

    window.procesarYRenderizar = () => {
        const bu = document.getElementById('sel-bu').value;
        const grp = document.getElementById('sel-grp').value;
        const pKey = document.getElementById('sel-periodo').value;
        const data = masterData.filter(d => (bu === 'ALL' || d.bu === bu) && (grp === 'ALL' || d.grp === grp));

        const validos = data.filter(d => d.valRet);
        const tardes = validos.filter(d => d.latL > 4 && d.latL < 1300);
        
        document.getElementById('k-ns').innerText = ((1 - tardes.length/(validos.length || 1))*100).toFixed(1) + '%';
        document.getElementById('k-viajes').innerText = validos.length;
        document.getElementById('k-tarde').innerText = tardes.length;
        document.getElementById('k-noinfo').innerText = data.filter(d => d.noInfo).length;

        renderStackedChart(validos, pKey);
        renderDonaChart(data);
        renderTopOperadores(validos);
        renderTable(validos, pKey);
    };

    function renderStackedChart(data, pKey) {
        const periodos = [...new Set(data.map(d => d[pKey]))].sort((a,b)=>a-b).slice(-8);
        const sets = { ok: [], it: [], pt: [], ni: [] };

        periodos.forEach(p => {
            const s = data.filter(x => x[pKey] === p);
            const t = s.length || 1;
            sets.ok.push(((s.filter(x => x.latL <= 4 && x.latI <= 0 && !x.noInfo).length / t) * 100).toFixed(1));
            sets.it.push(((s.filter(x => x.latI > 0 && !x.noInfo).length / t) * 100).toFixed(1)); 
            sets.pt.push(((s.filter(x => x.latL > 4 && x.latI <= 0 && !x.noInfo).length / t) * 100).toFixed(1)); 
            sets.ni.push(((s.filter(x => x.noInfo).length / t) * 100).toFixed(1)); 
        });

        if(charts.stack) charts.stack.destroy();
        charts.stack = new Chart(document.getElementById('chartStacked'), {
            type: 'bar',
            data: {
                labels: periodos.map(p => (pKey==='sem'?'S':'M')+p),
                datasets: [
                    { label: 'OK', data: sets.ok, backgroundColor: '#0056b3' },
                    { label: 'Tarde', data: sets.it, backgroundColor: '#b71c1c' },
                    { label: 'Trayecto', data: sets.pt, backgroundColor: '#e65100' },
                    { label: 'S/I', data: sets.ni, backgroundColor: '#9e9e9e' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, max: 100 } } }
        });
    }

    function renderDonaChart(data) {
        const sI = data.filter(d => d.noInfo).length;
        const tarde = data.filter(d => d.latI > 0 && !d.noInfo).length;
        const trayecto = data.filter(d => d.latL > 4 && d.latI <= 0 && !d.noInfo).length;
        const ok = data.length - (sI + tarde + trayecto);

        if(charts.dona) charts.dona.destroy();
        charts.dona = new Chart(document.getElementById('chartDona'), {
            type: 'doughnut',
            data: {
                labels: ['Todo OK', 'Inicio Tarde', 'Retraso Trayecto', 'Sin Info'],
                datasets: [{ data: [ok, tarde, trayecto, sI], backgroundColor: ['#0056b3', '#b71c1c', '#e65100', '#9e9e9e'] }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    function renderTopOperadores(data) {
        const fallas = {};
        data.filter(d => d.latI > 0).forEach(d => {
            const op = d.op || "Desconocido";
            fallas[op] = (fallas[op] || 0) + 1;
        });

        const sorted = Object.entries(fallas).sort((a,b) => b[1] - a[1]).slice(0, 10);
        document.querySelector('#tab-ops tbody').innerHTML = sorted.map(o => `
            <tr><td>${o[0]}</td><td><b>${o[1]}</b></td><td>⚠️ Crítico</td></tr>
        `).join('');
    }

    function renderTable(data, pKey) {
        const periodos = [...new Set(data.map(d => d[pKey]))].sort((a,b)=>a-b).slice(-4);
        const uniqueRows = [...new Set(data.map(d => `${d.bu}|${d.grp}`))].sort().slice(0, 20);
        
        document.getElementById('head-data').innerHTML = `<th>BU</th><th>CLIENTE</th>` + periodos.map(p => `<th>${pKey==='sem'?'S':'M'}${p}</th>`).join('');
        
        document.querySelector('#tab-data tbody').innerHTML = uniqueRows.map(row => {
            const [bu, grp] = row.split('|');
            const cells = periodos.map(p => {
                const s = data.filter(x => x.bu === bu && x.grp === grp && x[pKey] === p);
                if(!s.length) return '<td>-</td>';
                const ns = (1 - s.filter(x=>x.latL>4).length/s.length)*100;
                return `<td style="color:${ns < 90 ? '#b71c1c' : '#0056b3'}; font-weight:bold;">${ns.toFixed(0)}%</td>`;
            }).join('');
            return `<tr><td>${bu}</td><td>${grp}</td>${cells}</tr>`;
        }).join('');
    }

    document.getElementById('xlInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            document.getElementById('progress-container').style.display = 'block';
            let localBuffer = [];

            json.forEach((r, i) => {
                const toM = (v) => { if(!v) return null; if(typeof v === 'number') return v * 1440; const p = String(v).split(':'); return parseInt(p[0])*60 + parseInt(p[1]||0); };
                const noInfo = !r['end_eta'];
                localBuffer.push({
                    bu: r['business_unit'] || 'N/A',
                    grp: r['group'] || r['Cliente'] || 'N/A',
                    op: r['operator'] || r['Operador'] || 'N/A',
                    sem: parseInt(r['Semana'] || 0),
                    mes: parseInt(r['Mes'] || 0),
                    latL: noInfo ? 999 : Math.round(toM(r['end_eta']) - toM(r['end_time'])),
                    latI: noInfo ? 0 : Math.round(toM(r['start_eta']) - toM(r['start_time'])),
                    noInfo,
                    valRet: (r['shift'] === "IN" && [6,7,8].includes(parseInt(r['status'])))
                });
            });

            localStorage.setItem('settepi_local_db', JSON.stringify(localBuffer));
            location.reload();
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
